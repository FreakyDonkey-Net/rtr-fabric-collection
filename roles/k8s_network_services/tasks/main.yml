- name: Ensure LDAP seed users exist
  ansible.builtin.shell: |
    set -euo pipefail
    {{ k8s_network_services_kubectl_bin }} -n {{ k8s_network_services_namespace }} exec {{ k8s_network_services_ldap_pod_name.stdout }} -- sh -lc '
      ldapsearch -x -H {{ k8s_network_services_ldap_bootstrap_uri | quote }} \
