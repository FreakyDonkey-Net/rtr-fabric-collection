        "member: uid={{ member }},{{ k8s_network_services_ldap_seed_users_dn }}" \
        {% endfor %}
      | ldapadd -x -H {{ k8s_network_services_ldap_bootstrap_uri | quote }} \
          -D "cn=admin,dc=freakydonkey,dc=net" -w "$LDAP_ADMIN_PASSWORD"
    '
  args:
