        -b "{{ k8s_network_services_ldap_seed_users_dn }}" "(uid={{ item.username }})" dn | grep -q "^dn:" ||
      printf "%s\n" \
        "dn: uid={{ item.username }},{{ k8s_network_services_ldap_seed_users_dn }}" \
        "objectClass: inetOrgPerson" \
        "objectClass: organizationalPerson" \
        "objectClass: person" \
        "objectClass: top" \
        "cn: {{ item.cn | default(item.username) }}" \
        "sn: {{ item.sn | default(item.username) }}" \
        "uid: {{ item.username }}" \
        "mail: {{ item.mail | default(item.username ~ '@' ~ k8s_network_services_dns_internal_domain) }}" \
        "userPassword: {{ item.password }}" \
      | ldapadd -x -H {{ k8s_network_services_ldap_bootstrap_uri | quote }} \
