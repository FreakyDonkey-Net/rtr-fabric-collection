- name: Ensure LDAP seed groups exist
  ansible.builtin.shell: |
    set -euo pipefail
    {{ k8s_network_services_kubectl_bin }} -n {{ k8s_network_services_namespace }} exec {{ k8s_network_services_ldap_pod_name.stdout }} -- sh -lc '
      ldapsearch -x -H {{ k8s_network_services_ldap_bootstrap_uri | quote }} \
        -D "cn=admin,dc=freakydonkey,dc=net" -w "$LDAP_ADMIN_PASSWORD" \
        -b "{{ k8s_network_services_ldap_seed_groups_dn }}" "(cn={{ item.name }})" dn | grep -q "^dn:" ||
      printf "%s\n" \
        "dn: cn={{ item.name }},{{ k8s_network_services_ldap_seed_groups_dn }}" \
        "objectClass: groupOfNames" \
        "objectClass: top" \
        "cn: {{ item.name }}" \
