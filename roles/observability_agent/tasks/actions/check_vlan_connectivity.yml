---
- name: Check underlay VLAN subnets (Kube-OVN)
  ansible.builtin.command: >-
    {{ observability_agent_kubectl_bin }} get subnets -o wide
  register: observability_agent_vlan_subnets
  changed_when: false
  failed_when: false

- name: Display VLAN subnets
  ansible.builtin.debug:
    msg: "{{ observability_agent_vlan_subnets.stdout_lines | default([]) }}"
