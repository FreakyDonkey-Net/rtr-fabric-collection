---
k8s_openbao_runtime_namespace: "{{ openbao_runtime_namespace | default('openbao') }}"
k8s_openbao_runtime_namespace_pod_security_enforce: "{{ openbao_runtime_namespace_pod_security_enforce | default('baseline') }}"
k8s_openbao_runtime_namespace_pod_security_warn: "{{ openbao_runtime_namespace_pod_security_warn | default('restricted') }}"
k8s_openbao_runtime_namespace_pod_security_audit: "{{ openbao_runtime_namespace_pod_security_audit | default('restricted') }}"
k8s_openbao_runtime_image: "{{ openbao_runtime_image | default('docker.io/openbao/openbao:2.2.1') }}"
k8s_openbao_runtime_mode: "{{ openbao_runtime_mode | default('dev') }}"
k8s_openbao_runtime_storage_backend: "{{ openbao_runtime_storage_backend | default(k8s_openbao_runtime_mode) }}"
k8s_openbao_runtime_replicas: "{{ openbao_runtime_replicas | default(1) }}"
k8s_openbao_runtime_service_name: "{{ openbao_runtime_service_name | default('infra-openbao') }}"
k8s_openbao_runtime_service_type: "{{ openbao_runtime_service_type | default('ClusterIP') }}"
k8s_openbao_runtime_service_node_port: "{{ openbao_runtime_service_node_port | default('') }}"
k8s_openbao_runtime_headless_service_name: "{{ openbao_runtime_headless_service_name | default('infra-openbao-internal') }}"
k8s_openbao_runtime_cluster_port: "{{ openbao_runtime_cluster_port | default(8201) }}"
k8s_openbao_runtime_data_path: "{{ openbao_runtime_data_path | default('/openbao/data') }}"
k8s_openbao_runtime_storage_class: "{{ openbao_runtime_storage_class | default('longhorn') }}"
k8s_openbao_runtime_enforce_longhorn_volume_policy: "{{ openbao_runtime_enforce_longhorn_volume_policy | default(true) }}"
k8s_openbao_runtime_longhorn_volume_namespace: "{{ openbao_runtime_longhorn_volume_namespace | default('longhorn-system') }}"
k8s_openbao_runtime_longhorn_volume_node_selector: "{{ openbao_runtime_longhorn_volume_node_selector | default([]) }}"
k8s_openbao_runtime_longhorn_volume_disk_selector: "{{ openbao_runtime_longhorn_volume_disk_selector | default([]) }}"
k8s_openbao_runtime_longhorn_volume_number_of_replicas: "{{ openbao_runtime_longhorn_volume_number_of_replicas | default(1) }}"
k8s_openbao_runtime_data_size: "{{ openbao_runtime_data_size | default('10Gi') }}"
k8s_openbao_runtime_host_network: "{{ openbao_runtime_host_network | default(false) }}"
k8s_openbao_runtime_api_addr: "{{ openbao_runtime_api_addr | default('') }}"
k8s_openbao_runtime_raft_node_names: "{{ openbao_runtime_raft_node_names | default([]) }}"
k8s_openbao_runtime_raft_retry_join_hosts: "{{ openbao_runtime_raft_retry_join_hosts | default(k8s_openbao_runtime_raft_node_names) }}"
k8s_openbao_runtime_raft_key_shares: "{{ openbao_runtime_raft_key_shares | default(5) }}"
k8s_openbao_runtime_raft_key_threshold: "{{ openbao_runtime_raft_key_threshold | default(3) }}"
k8s_openbao_runtime_init_file: "{{ openbao_runtime_init_file | default('inventory/.secrets/openbao-init.json') }}"
k8s_openbao_runtime_approle_role_name: "{{ openbao_runtime_approle_role_name | default('rtr-fabric-github-prod') }}"
k8s_openbao_runtime_approle_token_ttl: "{{ openbao_runtime_approle_token_ttl | default('1h') }}"
k8s_openbao_runtime_approle_token_max_ttl: "{{ openbao_runtime_approle_token_max_ttl | default('4h') }}"
k8s_openbao_runtime_approle_secret_id_ttl: "{{ openbao_runtime_approle_secret_id_ttl | default('24h') }}"
k8s_openbao_runtime_approle_secret_id_num_uses: "{{ openbao_runtime_approle_secret_id_num_uses | default(20) }}"
k8s_openbao_runtime_rotate_approle_secret_id: "{{ openbao_runtime_rotate_approle_secret_id | default(false) }}"
k8s_openbao_runtime_node_name: "{{ openbao_runtime_node_name | default('rtr-sapinet') }}"
k8s_openbao_runtime_bind_address: "{{ openbao_runtime_bind_address | default('10.77.0.3:8200') }}"
k8s_openbao_runtime_kubectl_bin: "{{ openbao_runtime_kubectl_bin | default('kubectl') }}"
k8s_openbao_runtime_binary: "{{ openbao_runtime_binary | default('/bin/bao') }}"
k8s_openbao_runtime_management_url_override: "{{ openbao_runtime_management_url_override | default('') }}"
k8s_openbao_runtime_dry_run: "{{ openbao_runtime_dry_run | default(false) }}"
k8s_openbao_runtime_allow_prod: "{{ openbao_runtime_allow_prod | default(false) }}"
k8s_openbao_runtime_allow_legacy_dev_migration: "{{ openbao_runtime_allow_legacy_dev_migration | default(true) }}"
k8s_openbao_runtime_allow_single_node_prod: "{{ openbao_runtime_allow_single_node_prod | default(false) }}"
k8s_openbao_runtime_require_ha: "{{ openbao_runtime_require_ha | default(true) }}"
k8s_openbao_runtime_image_allow_latest: "{{ openbao_runtime_image_allow_latest | default(false) }}"
k8s_openbao_runtime_read_policy_name: "{{ openbao_runtime_read_policy_name | default('rtr-fabric-read') }}"
k8s_openbao_runtime_read_policy_paths: "{{ openbao_runtime_read_policy_paths | default([]) }}"
k8s_openbao_runtime_ldap_auth_enabled: "{{ openbao_runtime_ldap_auth_enabled | default(false) }}"
k8s_openbao_runtime_ldap_auth_path: "{{ openbao_runtime_ldap_auth_path | default('ldap') }}"
k8s_openbao_runtime_ldap_url: "{{ openbao_runtime_ldap_url | default('ldap://infra-ldap.net-services.svc.cluster.local:389') }}"
k8s_openbao_runtime_ldap_starttls: "{{ openbao_runtime_ldap_starttls | default(true) }}"
k8s_openbao_runtime_ldap_insecure_tls: "{{ openbao_runtime_ldap_insecure_tls | default(false) }}"
k8s_openbao_runtime_ldap_binddn: "{{ openbao_runtime_ldap_binddn | default('cn=admin,dc=freakydonkey,dc=net') }}"
k8s_openbao_runtime_ldap_bindpass: "{{ openbao_runtime_ldap_bindpass | default('') }}"
k8s_openbao_runtime_ldap_userdn: "{{ openbao_runtime_ldap_userdn | default('ou=Users,ou=FreakyDonkey,dc=freakydonkey,dc=net') }}"
k8s_openbao_runtime_ldap_userattr: "{{ openbao_runtime_ldap_userattr | default('uid') }}"
k8s_openbao_runtime_ldap_groupdn: "{{ openbao_runtime_ldap_groupdn | default('ou=Groups,ou=FreakyDonkey,dc=freakydonkey,dc=net') }}"
k8s_openbao_runtime_ldap_groupfilter: "{{ openbao_runtime_ldap_groupfilter | default('(&(objectClass=groupOfNames)(member=uid={{.Username}},ou=Users,ou=FreakyDonkey,dc=freakydonkey,dc=net))') }}"
k8s_openbao_runtime_ldap_groupattr: "{{ openbao_runtime_ldap_groupattr | default('cn') }}"
k8s_openbao_runtime_root_token_file: "{{ openbao_runtime_root_token_file | default('inventory/.secrets/openbao-root-token') }}"
k8s_openbao_runtime_read_token_file: "{{ openbao_runtime_read_token_file | default('inventory/.secrets/openbao-read-token') }}"
k8s_openbao_runtime_seed_net_services: "{{ openbao_runtime_seed_net_services | default(true) }}"
k8s_openbao_runtime_seed_openwrt_wifi_edge_pre: "{{ openbao_runtime_seed_openwrt_wifi_edge_pre | default(false) }}"
k8s_openbao_runtime_openwrt_wifi_source_host: "{{ openbao_runtime_openwrt_wifi_source_host | default('edge-pre') }}"
k8s_openbao_runtime_seed_acme: "{{ openbao_runtime_seed_acme | default(true) }}"
k8s_openbao_runtime_seed_ca: "{{ openbao_runtime_seed_ca | default(false) }}"
k8s_openbao_runtime_seed_ops_etcd_offsite: "{{ openbao_runtime_seed_ops_etcd_offsite | default(true) }}"
k8s_openbao_runtime_seed_github_actions_runner: "{{ openbao_runtime_seed_github_actions_runner | default(true) }}"
k8s_openbao_runtime_seed_bgp: "{{ openbao_runtime_seed_bgp | default(false) }}"
k8s_openbao_runtime_seed_monitoring: "{{ openbao_runtime_seed_monitoring | default(false) }}"
k8s_openbao_runtime_seed_auth_keycloak: "{{ openbao_runtime_seed_auth_keycloak | default(false) }}"
k8s_openbao_runtime_bgp_neighbor_password_file: "{{ openbao_runtime_bgp_neighbor_password_file | default(inventory_dir ~ '/.secrets/bgp-evpn-neighbor-password') }}"
k8s_openbao_runtime_https_ingress_enabled: "{{ openbao_runtime_https_ingress_enabled | default(false) }}"
k8s_openbao_runtime_https_tls_enabled: "{{ openbao_runtime_https_tls_enabled | default(true) }}"
k8s_openbao_runtime_https_hostname: "{{ openbao_runtime_https_hostname | default('openbao.freakydonkey.net') }}"
k8s_openbao_runtime_https_ingress_class_name: "{{ openbao_runtime_https_ingress_class_name | default('public') }}"
k8s_openbao_runtime_https_tls_secret_name: "{{ openbao_runtime_https_tls_secret_name | default('infra-openbao-tls-public') }}"
k8s_openbao_runtime_https_clusterissuer_name: "{{ openbao_runtime_https_clusterissuer_name | default('letsencrypt-cloudflare-dns') }}"
k8s_openbao_runtime_https_whitelist_source_ranges: "{{ openbao_runtime_https_whitelist_source_ranges | default(['10.13.11.0/24', '10.13.40.0/24']) }}"
k8s_openbao_runtime_pod_tolerations: "{{ openbao_runtime_pod_tolerations | default([]) }}"
