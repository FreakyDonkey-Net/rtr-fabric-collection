      {%- if (k8s_network_services_ca_root_crt_pem | default('') | string | trim | length) > 0 -%}
      {%-   set _ = ns.payload.update({'ca_root_crt_pem': k8s_network_services_ca_root_crt_pem}) -%}
      {%- endif -%}
      {%- if (k8s_network_services_ca_intermediate_crt_pem | default('') | string | trim | length) > 0 -%}
      {%-   set _ = ns.payload.update({'ca_intermediate_crt_pem': k8s_network_services_ca_intermediate_crt_pem}) -%}
      {%- endif -%}
