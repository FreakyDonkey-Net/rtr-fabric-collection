- name: Resolve effective OpenBao LDAP bind password
  ansible.builtin.set_fact:
    k8s_openbao_runtime_ldap_bindpass_effective: >-
      {{
        [
          k8s_openbao_runtime_ldap_bindpass | default('', true) | string | trim,
          lookup('ansible.builtin.file', inventory_dir ~ '/.secrets/ldap-admin-password', errors='ignore') | default('', true) | string | trim,
          vault_k8s_network_services_ldap_admin_password | default('', true) | string | trim
        ]
        | reject('equalto', '')
        | first
        | default('')
      }}
  no_log: true
  changed_when: false
  when: k8s_openbao_runtime_ldap_auth_enabled | bool

- name: Derive OpenBao runtime context
  ansible.builtin.set_fact:
    k8s_openbao_runtime_is_dev: "{{ (k8s_openbao_runtime_mode | string | lower) == 'dev' }}"
    k8s_openbao_runtime_is_raft: "{{ (k8s_openbao_runtime_mode | string | lower) == 'raft' }}"
    k8s_openbao_runtime_manifest_rollout_kind: "{{ 'statefulset' if ((k8s_openbao_runtime_mode | string | lower) == 'raft') else 'deployment' }}"
    k8s_openbao_runtime_manifest_rollout_name: "{{ k8s_openbao_runtime_service_name }}"
    k8s_openbao_runtime_legacy_deployment_name: "{{ k8s_openbao_runtime_service_name }}"
    k8s_openbao_runtime_statefulset_name: "{{ k8s_openbao_runtime_service_name }}"
    k8s_openbao_runtime_primary_pod: "{{ k8s_openbao_runtime_service_name }}-0"
    k8s_openbao_runtime_secret_dir: "{{ k8s_openbao_runtime_root_token_file | dirname }}"
    k8s_openbao_runtime_management_port_forward_target: >-
      {{
        (
          'pod/' ~ k8s_openbao_runtime_service_name ~ '-0'
        )
        if ((k8s_openbao_runtime_mode | string | lower) == 'raft')
        else (
          'service/' ~ k8s_openbao_runtime_service_name
        )
      }}
    k8s_openbao_runtime_openbao_url_scheme: >-
      {{
        openbao_url
        | ansible.builtin.urlsplit('scheme')
        | default('', true)
        | string
        | lower
      }}
    k8s_openbao_runtime_ldap_url_scheme: >-
      {{
        k8s_openbao_runtime_ldap_url
        | ansible.builtin.urlsplit('scheme')
        | default('', true)
        | string
        | lower
      }}
    k8s_openbao_runtime_pod_names: >-
      {{
        query(
          'ansible.builtin.sequence',
          'start=0 count=' ~ (k8s_openbao_runtime_replicas | int) ~
          ' format=' ~ k8s_openbao_runtime_service_name ~ '-%d'
        )
      }}
  changed_when: false

- name: Validate OpenBao runtime inputs
  ansible.builtin.assert:
    that:
      - k8s_openbao_runtime_namespace | string | length > 0
      - k8s_openbao_runtime_image | string | length > 0
      - (k8s_openbao_runtime_mode | string | lower) in ['dev', 'raft']
      - not (k8s_openbao_runtime_is_dev | bool) or (k8s_openbao_runtime_node_name | string | length) > 0
      - not (k8s_openbao_runtime_is_dev | bool) or (k8s_openbao_runtime_bind_address | string | length) > 0
      - k8s_openbao_runtime_kubectl_bin | string | length > 0
      - openbao_url | string | length > 0
      - >-
        not (rtr_fabric_is_prod | default(false) | bool)
        or (k8s_openbao_runtime_allow_prod | bool)
      - not (rtr_fabric_is_prod | default(false) | bool) or (k8s_openbao_runtime_is_raft | bool)
      - >-
        not (k8s_openbao_runtime_is_raft | bool)
        or (
          (k8s_openbao_runtime_replicas | int) >= 3
          or (
            (k8s_openbao_runtime_allow_single_node_prod | bool)
            and ((k8s_openbao_runtime_replicas | int) == 1)
          )
        )
      - >-
        not (k8s_openbao_runtime_is_raft | bool)
        or (k8s_openbao_runtime_raft_node_names | default([]) | length) >= (k8s_openbao_runtime_replicas | int)
      - >-
        not (k8s_openbao_runtime_is_raft | bool)
        or (k8s_openbao_runtime_storage_class | string | trim | length) > 0
      - >-
        not (k8s_openbao_runtime_is_raft | bool)
        or (k8s_openbao_runtime_data_size | string | trim | length) > 0
      - >-
        not (k8s_openbao_runtime_is_raft | bool)
        or not (k8s_openbao_runtime_host_network | bool)
        or (k8s_openbao_runtime_api_addr | string | trim | length) > 0
      - k8s_openbao_runtime_openbao_url_scheme in ['http', 'https']
      - >-
        not (openbao_validate_certs | bool)
        or (k8s_openbao_runtime_openbao_url_scheme == 'https')
      - >-
        (k8s_openbao_runtime_image_allow_latest | bool)
        or not (
          (k8s_openbao_runtime_image | string | trim)
          is match('^.+:latest(?:@sha256:[0-9a-f]{64})?$')
        )
      - >-
        not (k8s_openbao_runtime_https_ingress_enabled | bool)
        or (k8s_openbao_runtime_https_hostname | string | trim | length) > 0
      - >-
        not (k8s_openbao_runtime_https_ingress_enabled | bool)
        or (k8s_openbao_runtime_https_ingress_class_name | string | trim | length) > 0
      - >-
        not (k8s_openbao_runtime_https_ingress_enabled | bool)
        or not (k8s_openbao_runtime_https_tls_enabled | bool)
        or (k8s_openbao_runtime_https_tls_secret_name | string | trim | length) > 0
      - >-
        not (k8s_openbao_runtime_https_ingress_enabled | bool)
        or not (k8s_openbao_runtime_https_tls_enabled | bool)
        or (k8s_openbao_runtime_https_clusterissuer_name | string | trim | length) > 0
      - >-
        not (k8s_openbao_runtime_ldap_auth_enabled | bool)
        or (k8s_network_services_ldap_enabled | bool)
      - >-
        not (k8s_openbao_runtime_ldap_auth_enabled | bool)
        or (k8s_openbao_runtime_ldap_bindpass_effective | default('') | string | trim | length) > 0
      - >-
        not (k8s_openbao_runtime_ldap_auth_enabled | bool)
        or (k8s_network_services_ldap_seed_users | length) > 0
      - >-
        not (k8s_openbao_runtime_ldap_auth_enabled | bool)
        or k8s_openbao_runtime_ldap_url_scheme in ['ldap', 'ldaps']
      - >-
        not (
          (k8s_openbao_runtime_ldap_url_scheme == 'ldaps')
          and (k8s_openbao_runtime_ldap_starttls | bool)
        )
      - >-
        not (
          (rtr_fabric_is_prod | default(false) | bool)
          and (k8s_openbao_runtime_ldap_auth_enabled | bool)
        )
        or (
          (
            (k8s_openbao_runtime_ldap_url_scheme == 'ldaps')
            and not (k8s_openbao_runtime_ldap_insecure_tls | bool)
          )
          or (
            (k8s_openbao_runtime_ldap_url_scheme == 'ldap')
            and (k8s_openbao_runtime_ldap_starttls | bool)
            and not (k8s_openbao_runtime_ldap_insecure_tls | bool)
          )
        )

- name: Ensure local OpenBao secret directory exists
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
  loop:
    - "{{ k8s_openbao_runtime_secret_dir }}"
    - "{{ k8s_openbao_runtime_init_file | dirname }}"
    - "{{ openbao_approle_role_id_file | dirname }}"
    - "{{ openbao_approle_secret_id_file | dirname }}"
  loop_control:
    label: "{{ item }}"
  delegate_to: localhost
  vars:
    ansible_connection: local
    ansible_become: false

- name: Ensure local OpenBao root token file exists in dev mode
  ansible.builtin.copy:
    dest: "{{ k8s_openbao_runtime_root_token_file }}"
    content: "{{ lookup('ansible.builtin.password', '/dev/null length=48 chars=hexdigits') }}"
    mode: "0600"
    force: false
  delegate_to: localhost
  vars:
    ansible_connection: local
    ansible_become: false
  no_log: true
  when: k8s_openbao_runtime_is_dev | bool

- name: Load OpenBao root token from local file in dev mode
  ansible.builtin.set_fact:
    k8s_openbao_runtime_root_token_effective: >-
      {{
        lookup('ansible.builtin.file', k8s_openbao_runtime_root_token_file)
        | string
        | trim
      }}
  delegate_to: localhost
  vars:
    ansible_connection: local
    ansible_become: false
  no_log: true
  when: k8s_openbao_runtime_is_dev | bool

- name: Build OpenBao seed payload for net-services
  ansible.builtin.set_fact:
    k8s_openbao_runtime_seed_payload_net_services: |
      {%- set ns = namespace(payload={}) -%}
      {%- if (k8s_network_services_radius_openwrt_client_secret | default('') | string | trim | length) > 0 -%}
      {%-   set _ = ns.payload.update({'radius_openwrt_client_secret': k8s_network_services_radius_openwrt_client_secret}) -%}
      {%- endif -%}
      {%- if (k8s_network_services_radius_users | default([]) | length) > 0 -%}
      {%-   set _ = ns.payload.update({'radius_users': k8s_network_services_radius_users}) -%}
      {%- endif -%}
      {%- if (k8s_network_services_radius_tls_server_pem | default('') | string | trim | length) > 0 -%}
      {%-   set _ = ns.payload.update({'radius_tls_server_pem': k8s_network_services_radius_tls_server_pem}) -%}
      {%- endif -%}
      {%- if (k8s_network_services_radius_tls_ca_pem | default('') | string | trim | length) > 0 -%}
      {%-   set _ = ns.payload.update({'radius_tls_ca_pem': k8s_network_services_radius_tls_ca_pem}) -%}
      {%- endif -%}
      {%- if (k8s_network_services_ldap_admin_password | default('') | string | trim | length) > 0 -%}
      {%-   set _ = ns.payload.update({'ldap_admin_password': k8s_network_services_ldap_admin_password}) -%}
      {%- endif -%}
      {%- if (k8s_network_services_ldap_seed_users | default([]) | length) > 0 -%}
      {%-   set _ = ns.payload.update({'ldap_seed_users': k8s_network_services_ldap_seed_users}) -%}
      {%- endif -%}
      {%- if (k8s_network_services_ldap_seed_groups | default([]) | length) > 0 -%}
      {%-   set _ = ns.payload.update({'ldap_seed_groups': k8s_network_services_ldap_seed_groups}) -%}
      {%- endif -%}
      {{ ns.payload }}
  when: k8s_openbao_runtime_seed_net_services | bool
  no_log: true
  changed_when: false

- name: Build OpenBao seed payload for OpenWrt Wi-Fi
  ansible.builtin.set_fact:
    k8s_openbao_runtime_seed_payload_openwrt_wifi_edge_pre: |
      {%- set ns = namespace(payload={}) -%}
      {%- set wifi_source_host = k8s_openbao_runtime_openwrt_wifi_source_host | string | trim -%}
      {%- set wifi_source = hostvars[wifi_source_host] | default({}) -%}
      {%- set admin_psk = [
            wifi_source.vault_openwrt_wifi_admin_psk | default('', true) | string | trim,
            wifi_source.openwrt_wifi_profiles_admin_psk_seed | default('', true) | string | trim
          ]
          | reject('equalto', '')
          | first
          | default('')
      -%}
      {%- set trusted_psk = [
            wifi_source.vault_openwrt_wifi_trusted_psk | default('', true) | string | trim,
            wifi_source.openwrt_wifi_profiles_trusted_psk_seed | default('', true) | string | trim
          ]
          | reject('equalto', '')
          | first
          | default('')
      -%}
      {%- set iot_psk = [
            wifi_source.vault_openwrt_wifi_iot_psk | default('', true) | string | trim,
            wifi_source.openwrt_wifi_profiles_iot_psk_seed | default('', true) | string | trim
          ]
          | reject('equalto', '')
          | first
          | default('')
      -%}
      {%- if admin_psk | length > 0 -%}
      {%-   set _ = ns.payload.update({'admin_psk': admin_psk}) -%}
      {%- endif -%}
      {%- if trusted_psk | length > 0 -%}
      {%-   set _ = ns.payload.update({'trusted_psk': trusted_psk}) -%}
      {%- endif -%}
      {%- if iot_psk | length > 0 -%}
      {%-   set _ = ns.payload.update({'iot_psk': iot_psk}) -%}
      {%- endif -%}
      {{ ns.payload }}
  when: k8s_openbao_runtime_seed_openwrt_wifi_edge_pre | bool
  no_log: true
  changed_when: false

- name: Build OpenBao seed payload for ACME
  ansible.builtin.set_fact:
    k8s_openbao_runtime_seed_payload_acme: |
      {%- set ns = namespace(payload={}) -%}
      {%- if (vault_cloudflare_api_token | default('') | string | trim | length) > 0 -%}
      {%-   set _ = ns.payload.update({'cloudflare_api_token': vault_cloudflare_api_token}) -%}
      {%- endif -%}
      {%- if (vault_acme_email | default('') | string | trim | length) > 0 -%}
