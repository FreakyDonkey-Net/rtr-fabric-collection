- name: Build OpenBao seed payload for GitHub Actions runner credentials
  ansible.builtin.set_fact:
    k8s_openbao_runtime_seed_payload_github_actions_runner: |
      {%- set ns = namespace(payload={}) -%}
      {%- set github_token = [
            lookup('ansible.builtin.env', 'RTR_FABRIC_GITHUB_RUNNER_TOKEN') | default('', true) | string | trim,
            lookup('ansible.builtin.file', inventory_dir ~ '/.secrets/github-actions-runner-token', errors='ignore') | default('', true) | string | trim,
            vault_github_actions_runner_token | default('', true) | string | trim
          ]
          | reject('equalto', '')
          | first
          | default('')
      -%}
      {%- set role_repos_read_token = [
            lookup('ansible.builtin.env', 'ROLE_REPOS_READ_TOKEN') | default('', true) | string | trim,
            lookup('ansible.builtin.file', inventory_dir ~ '/.secrets/role-repos-read-token', errors='ignore') | default('', true) | string | trim,
            vault_role_repos_read_token | default('', true) | string | trim,
            github_token
          ]
          | reject('equalto', '')
          | first
          | default('')
      -%}
      {%- set repo_split_push_token = [
            lookup('ansible.builtin.env', 'REPO_SPLIT_PUSH_TOKEN') | default('', true) | string | trim,
            lookup('ansible.builtin.file', inventory_dir ~ '/.secrets/repo-split-push-token', errors='ignore') | default('', true) | string | trim,
            vault_repo_split_push_token | default('', true) | string | trim
          ]
          | reject('equalto', '')
          | first
          | default('')
      -%}
      {%- if (github_token | length) > 0 -%}
      {%-   set _ = ns.payload.update({'github_auth_token': github_token}) -%}
      {%- endif -%}
      {%- if (role_repos_read_token | length) > 0 -%}
      {%-   set _ = ns.payload.update({'role_repos_read_token': role_repos_read_token}) -%}
      {%- endif -%}
      {%- if (repo_split_push_token | length) > 0 -%}
      {%-   set _ = ns.payload.update({'repo_split_push_token': repo_split_push_token}) -%}
      {%- endif -%}
      {{ ns.payload }}
  when: k8s_openbao_runtime_seed_github_actions_runner | bool
  no_log: true
  changed_when: false

